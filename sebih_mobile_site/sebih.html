            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const observer = new IntersectionObserver(
                    ([entry]) => { if (entry.isIntersecting) { setIsVisible(true); observer.disconnect(); } },
                    { threshold }
                );
                observer.observe(el);
                return () => observer.disconnect();
            }, []);
            return [ref, isVisible];
        };

        const AnimatedCounter = ({ target, suffix = "" }) => {
            const [ref, isVisible] = useRevealOnScroll(0.3);
            const [count, setCount] = useState(0);
            useEffect(() => {
                if (!isVisible) return;
                const duration = 1500;
                const steps = 30;
                const increment = target / steps;
                let current = 0;
                const timer = setInterval(() => {
                    current += increment;
                    if (current >= target) { setCount(target); clearInterval(timer); }
                    else setCount(Math.floor(current));
                }, duration / steps);
                return () => clearInterval(timer);
            }, [isVisible, target]);
            return <span ref={ref}>{count}{suffix}</span>;
        };

            const [hidden, setHidden] = useState(false);
            const lastScrollY = useRef(0);
            const ticking = useRef(false);
            const delta = useRef(0);
            useEffect(() => {
                const THRESHOLD = 15;
                const onScroll = () => {
                    if (ticking.current) return;
                    ticking.current = true;
                    requestAnimationFrame(() => {
                        const y = Math.max(0, window.scrollY);
                        const diff = y - lastScrollY.current;
                        if (Math.abs(diff) > 3) delta.current += diff;
                        if (y <= 80) {
                            setHidden(false);
                            delta.current = 0;
                        } else if (delta.current > THRESHOLD) {
                            setHidden(true);
                            delta.current = 0;
                        } else if (delta.current < -THRESHOLD) {
                            setHidden(false);
                            delta.current = 0;
                        }
                        lastScrollY.current = y;
                        ticking.current = false;
                    });
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return hidden;

                                        <input className="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary transition-colors py-3 px-1 outline-none font-body" type="tel" placeholder="Tel"/>
                                    </div>
                                </div>
                                <div>
                                    <label className="block font-label text-[10px] uppercase tracking-widest text-secondary mb-1">Konu</label>
                                    <select className="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary transition-colors py-3 px-1 outline-none font-body appearance-none">
                                        <option>Toptan Satış</option>
                                        <option>Üretim Talebi</option>
                                        <option>Katalog Talebi</option>
                                        <option>Diğer</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block font-label text-[10px] uppercase tracking-widest text-secondary mb-1">Mesajınız</label>
                                    <textarea required className="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-secondary transition-colors py-3 px-1 outline-none font-body resize-none" rows="4" placeholder="Size nasıl yardımcı olabiliriz?"></textarea>
                                </div>
                                <button type="submit" className="w-full bg-primary text-on-primary py-5 rounded-md font-label uppercase tracking-widest text-xs flex items-center justify-center gap-2 group hover:bg-primary-container transition-all">
                                    {submitted ? '✓ Gönderildi!' : 'Gönder'}
                                    {!submitted && <span className="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">send</span>}
                                </button>
                            </form>
                        </section>

                        </div>{/* end two-column layout */}
                    </main>
                    <Footer />
                </div>
            );
        };

        // ============================================================
        // SECTION 8: APP SHELL & ROUTER
        // ============================================================

        const App = () => {
            const [basket, setBasket] = useState([]);
            const [menuOpen, setMenuOpen] = useState(false);

            return (
                <HashRouter>
                    <ScrollToTop />
                    <div className="relative min-h-screen flex flex-col">
                        <Header menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
                        <MobileMenu isOpen={menuOpen} onClose={() => setMenuOpen(false)} />
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/katalog" element={<CatalogPage basket={basket} setBasket={setBasket} />} />
                            <Route path="/hakkimizda" element={<AboutPage />} />
                            <Route path="/iletisim" element={<ContactPage />} />
                        </Routes>
                        <WhatsAppButton />
                        <BottomNav />
                    </div>
                </HashRouter>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
